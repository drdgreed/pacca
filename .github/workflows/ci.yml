# =============================================================================
# PACCA CI Pipeline
# Runs on every push and pull request
# =============================================================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Nightly clinical-gate run for main (11:00 UTC). Other jobs are cheap.
    - cron: "0 11 * * *"
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ---------------------------------------------------------------------------
  # Lint and Type Check
  # ---------------------------------------------------------------------------
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy

      - name: Run Ruff linter
        run: ruff check src/ tests/

      - name: Run Ruff formatter check
        run: ruff format --check src/ tests/

      - name: Run MyPy type checker
        run: mypy src/pacca --ignore-missing-imports
        continue-on-error: true  # Type errors are warnings for now

  # ---------------------------------------------------------------------------
  # Unit Tests
  # ---------------------------------------------------------------------------
  test:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        env:
          ANTHROPIC_API_KEY: "sk-ant-test-placeholder"
          APP_ENV: "development"
          DEBUG: "true"
        run: |
          pytest tests/unit -v --tb=short -x

      - name: Run tests with coverage
        env:
          ANTHROPIC_API_KEY: "sk-ant-test-placeholder"
          APP_ENV: "development"
          DEBUG: "true"
        run: |
          pytest tests/unit --cov=pacca --cov-report=xml --cov-report=term-missing
        continue-on-error: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # ---------------------------------------------------------------------------
  # Build Docker Image
  # ---------------------------------------------------------------------------
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: pacca:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Security Scan
  # ---------------------------------------------------------------------------
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [lint]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety

      - name: Run Bandit security linter
        run: bandit -r src/pacca -ll
        continue-on-error: true

      - name: Check dependencies for vulnerabilities
        run: |
          pip install -e .
          safety check
        continue-on-error: true

  # ---------------------------------------------------------------------------
  # Manifest validation (P-6) — every behavioral change ships a valid manifest
  # ---------------------------------------------------------------------------
  validate-manifests:
    name: Validate change manifests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Validate all manifests against the schema
        run: python -m pacca.harness.validate_manifest --all

  # ---------------------------------------------------------------------------
  # Clinical gate (P-6) — GC-018/019 + golden-set accuracy. Real Anthropic
  # calls, so it runs only when it matters: the nightly schedule, or a PR that
  # touches agent/rag code or carries a chg- commit. Opt-in by secret (inert
  # until ANTHROPIC_API_KEY is set), so it never blocks doc-only PRs.
  # ---------------------------------------------------------------------------
  clinical-gate:
    name: Clinical gate (GC-018/019 + accuracy)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decide whether to run
        id: gate
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          if [ "$EVENT_NAME" = "schedule" ] || [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          base="${BASE_SHA:-origin/main}"
          # Commit subjects and file names are only piped to grep, never executed.
          if git diff --name-only "$base"...HEAD | grep -qE '^src/pacca/(agents|rag)/'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "::notice::clinical-gate: PR touches agent/rag code"; exit 0
          fi
          if git log --format='%s' "$base"...HEAD | grep -qE '^chg-'; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "::notice::clinical-gate: PR carries a chg- (behavioral) commit"; exit 0
          fi
          echo "run=false" >> "$GITHUB_OUTPUT"
          echo "::notice::clinical-gate skipped — no agent/rag change or chg- commit"

      - name: Check for API key (opt-in by secret)
        id: key
        if: steps.gate.outputs.run == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::ANTHROPIC_API_KEY not set — clinical-gate is inert until it is added"
          fi

      - name: Set up Python
        if: steps.gate.outputs.run == 'true' && steps.key.outputs.present == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        if: steps.gate.outputs.run == 'true' && steps.key.outputs.present == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run clinical gate (GC-018/019 + accuracy threshold)
        if: steps.gate.outputs.run == 'true' && steps.key.outputs.present == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: make test-clinical
