repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    # rev pinned to match the project's local + CI ruff version. CI uses
    # `pip install ruff` (latest); when CI's ruff and the pre-commit hook's
    # ruff disagree on formatting, format drift lands on main and breaks CI.
    # iter-3/4/5 hit this repeatedly until iter-5 autonomous fix-up bumped
    # the pin. Re-pin when CI's installed ruff diverges materially.
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic>=2.10.0
          - pydantic-settings>=2.0.0
          - types-python-dateutil
          - pytest>=8.0.0
          - pytest-asyncio>=0.23.0
        args: [--ignore-missing-imports]

  - repo: local
    hooks:
      - id: pacca-phi-secret-guard
        name: PACCA PHI / secret guard
        entry: python3 .githooks/pacca_guard.py
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
