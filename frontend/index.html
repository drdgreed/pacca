<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PACCA - Prior Authorization Platform</title>
    <meta name="description" content="AI-powered healthcare prior authorization platform" />

    <!--
      Editorial-Clinical aesthetic fonts. Loaded app-wide as of the
      UI-convergence migration (PR-UI-1 through PR-UI-5). All surfaces
      use these fonts via theme tokens defined in
      frontend/src/styles/theme.css.

      display=swap avoids blocking render; preconnect saves ~80–150ms
      on first paint.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=Spectral:wght@500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
