<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PACCA - Prior Authorization Platform</title>
    <meta name="description" content="AI-powered healthcare prior authorization platform" />

    <!--
      Fonts for the SME Case Authoring surface (Editorial-Clinical aesthetic).
      Loaded with display=swap to avoid blocking render. Preconnect saves
      ~80–150ms on first paint.

      The existing Provider/Director/Admin surfaces use Inter via the
      Tailwind defaults; that aesthetic is preserved by scoping these
      fonts to the .sme-authoring CSS class (see frontend/src/sme-authoring/theme.css).
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=Spectral:wght@500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
