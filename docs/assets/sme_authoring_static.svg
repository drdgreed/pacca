<svg width="1000" height="560" viewBox="0 0 1000 560" xmlns="http://www.w3.org/2000/svg"><rect x="0" y="0" width="1000" height="560" rx="14" fill="#111318" stroke="#2c3444" stroke-width="1"/><text x="36" y="46" text-anchor="start" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#e8edf5">PACCA · SME Case Authoring</text><text x="37" y="70" text-anchor="start" font-family="Arial, sans-serif" font-size="12.5" font-weight="400" fill="#9aa6b8">A clinician describes a case in plain English. Six deterministic validators decide whether it may be written.</text><rect x="40" y="110" width="380" height="56" rx="10" fill="#171b22" stroke="#2a3242" stroke-width="1"/><circle cx="70" cy="138" r="14" fill="#1b2030" stroke="#2BC0C8" stroke-width="1.5"/><text x="70" y="142.5" text-anchor="middle" font-family="'JetBrains Mono','SFMono-Regular',Menlo,monospace" font-size="11" font-weight="700" fill="#2BC0C8">1</text><text x="96" y="134" text-anchor="start" font-family="Arial, sans-serif" font-size="13.5" font-weight="700" fill="#e8edf5">Scenario</text><text x="96" y="152" text-anchor="start" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#9aa6b8">clinician describes the case in plain English</text><rect x="40" y="174" width="380" height="56" rx="10" fill="#171b22" stroke="#2a3242" stroke-width="1"/><circle cx="70" cy="202" r="14" fill="#1b2030" stroke="#2BC0C8" stroke-width="1.5"/><text x="70" y="206.5" text-anchor="middle" font-family="'JetBrains Mono','SFMono-Regular',Menlo,monospace" font-size="11" font-weight="700" fill="#2BC0C8">2</text><text x="96" y="198" text-anchor="start" font-family="Arial, sans-serif" font-size="13.5" font-weight="700" fill="#e8edf5">Drafting</text><text x="96" y="216" text-anchor="start" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#9aa6b8">Claude drafts rationale, citations, judge criteria</text><rect x="40" y="238" width="380" height="56" rx="10" fill="#171b22" stroke="#2a3242" stroke-width="1"/><circle cx="70" cy="266" r="14" fill="#1b2030" stroke="#2BC0C8" stroke-width="1.5"/><text x="70" y="270.5" text-anchor="middle" font-family="'JetBrains Mono','SFMono-Regular',Menlo,monospace" font-size="11" font-weight="700" fill="#2BC0C8">3</text><text x="96" y="262" text-anchor="start" font-family="Arial, sans-serif" font-size="13.5" font-weight="700" fill="#e8edf5">Draft Review</text><text x="96" y="280" text-anchor="start" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#9aa6b8">SME edits fields · adds guideline citation</text><rect x="40" y="302" width="380" height="56" rx="10" fill="#171b22" stroke="#2a3242" stroke-width="1"/><circle cx="70" cy="330" r="14" fill="#1b2030" stroke="#2BC0C8" stroke-width="1.5"/><text x="70" y="334.5" text-anchor="middle" font-family="'JetBrains Mono','SFMono-Regular',Menlo,monospace" font-size="11" font-weight="700" fill="#2BC0C8">4</text><text x="96" y="326" text-anchor="start" font-family="Arial, sans-serif" font-size="13.5" font-weight="700" fill="#e8edf5">Validators</text><text x="96" y="344" text-anchor="start" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#9aa6b8">6 deterministic checks — all must pass</text><rect x="40" y="366" width="380" height="56" rx="10" fill="#171b22" stroke="#2a3242" stroke-width="1"/><circle cx="70" cy="394" r="14" fill="#1b2030" stroke="#2BC0C8" stroke-width="1.5"/><text x="70" y="398.5" text-anchor="middle" font-family="'JetBrains Mono','SFMono-Regular',Menlo,monospace" font-size="11" font-weight="700" fill="#2BC0C8">5</text><text x="96" y="390" text-anchor="start" font-family="Arial, sans-serif" font-size="13.5" font-weight="700" fill="#e8edf5">Attestation</text><text x="96" y="408" text-anchor="start" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#9aa6b8">human sign-off recorded against the case</text><rect x="40" y="430" width="380" height="56" rx="10" fill="#171b22" stroke="#2a3242" stroke-width="1"/><circle cx="70" cy="458" r="14" fill="#1b2030" stroke="#2BC0C8" stroke-width="1.5"/><text x="70" y="462.5" text-anchor="middle" font-family="'JetBrains Mono','SFMono-Regular',Menlo,monospace" font-size="11" font-weight="700" fill="#2BC0C8">6</text><text x="96" y="454" text-anchor="start" font-family="Arial, sans-serif" font-size="13.5" font-weight="700" fill="#e8edf5">Commit</text><text x="96" y="472" text-anchor="start" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#9aa6b8">AST emit → integrity test → rollback on fail</text><rect x="444" y="110" width="516" height="358" rx="10" fill="#0d1014" stroke="#2a3242" stroke-width="1"/><text x="944" y="130" text-anchor="end" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#6a7488" font-style="italic">validators</text><text x="464" y="134" text-anchor="start" font-family="'JetBrains Mono','SFMono-Regular',Menlo,monospace" font-size="11" font-weight="400" fill="#4ade80">$ pacca sme-author new</text><rect x="464" y="154" width="74.5" height="21" rx="10.5" fill="#143038" stroke="#1f5d63" stroke-width="1"/><path d="M475,164.5 l3,3 l6,-7" stroke="#67e8c3" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="489" y="168.0" text-anchor="start" font-family="'JetBrains Mono','SFMono-Regular',Menlo,monospace" font-size="9.5" font-weight="400" fill="#bfe9ec">no_phi</text><rect x="700" y="154" width="143.5" height="21" rx="10.5" fill="#143038" stroke="#1f5d63" stroke-width="1"/><path d="M711,164.5 l3,3 l6,-7" stroke="#67e8c3" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="725" y="168.0" text-anchor="start" font-family="'JetBrains Mono','SFMono-Regular',Menlo,monospace" font-size="9.5" font-weight="400" fill="#bfe9ec">guideline_citation</text><rect x="464" y="184" width="149.2" height="21" rx="10.5" fill="#143038" stroke="#1f5d63" stroke-width="1"/><path d="M475,194.5 l3,3 l6,-7" stroke="#67e8c3" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="489" y="198.0" text-anchor="start" font-family="'JetBrains Mono','SFMono-Regular',Menlo,monospace" font-size="9.5" font-weight="400" fill="#bfe9ec">schema_completeness</text><rect x="700" y="184" width="132.0" height="21" rx="10.5" fill="#143038" stroke="#1f5d63" stroke-width="1"/><path d="M711,194.5 l3,3 l6,-7" stroke="#67e8c3" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="725" y="198.0" text-anchor="start" font-family="'JetBrains Mono','SFMono-Regular',Menlo,monospace" font-size="9.5" font-weight="400" fill="#bfe9ec">outcome ↔ branch</text><rect x="464" y="214" width="160.8" height="21" rx="10.5" fill="#143038" stroke="#1f5d63" stroke-width="1"/><path d="M475,224.5 l3,3 l6,-7" stroke="#67e8c3" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="489" y="228.0" text-anchor="start" font-family="'JetBrains Mono','SFMono-Regular',Menlo,monospace" font-size="9.5" font-weight="400" fill="#bfe9ec">reasoning_specificity</text><rect x="700" y="214" width="120.5" height="21" rx="10.5" fill="#143038" stroke="#1f5d63" stroke-width="1"/><path d="M711,224.5 l3,3 l6,-7" stroke="#67e8c3" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="725" y="228.0" text-anchor="start" font-family="'JetBrains Mono','SFMono-Regular',Menlo,monospace" font-size="9.5" font-weight="400" fill="#bfe9ec">judge_criteria</text><rect x="464" y="252" width="476" height="21" rx="10.5" fill="#1b2b27" stroke="#2c7350" stroke-width="1"/><text x="476" y="266.5" text-anchor="start" font-family="'JetBrains Mono','SFMono-Regular',Menlo,monospace" font-size="9.5" font-weight="400" fill="#bfe9cf">6 / 6 pass — write unblocked</text><rect x="464" y="282" width="476" height="21" rx="10.5" fill="#1d1812" stroke="#5a4326" stroke-width="1" stroke-dasharray="3 3"/><text x="476" y="296.5" text-anchor="start" font-family="'JetBrains Mono','SFMono-Regular',Menlo,monospace" font-size="9.5" font-weight="400" fill="#caa978">✕ any FAIL → file mutation rolled back, SME revises</text><text x="464" y="336" text-anchor="start" font-family="Arial, sans-serif" font-size="10.5" font-weight="400" fill="#9aa6b8">Attestation and provenance are written with the case —</text><text x="464" y="352" text-anchor="start" font-family="Arial, sans-serif" font-size="10.5" font-weight="400" fill="#9aa6b8">docs/CASE_PROVENANCE.md gains one row naming the reviewer.</text><text x="36" y="534" text-anchor="start" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#6a7488">Same library behind both surfaces: the CLI and the web wizard call src/pacca/agents/sme_authoring/. Synthetic data only — no PHI.</text></svg>
