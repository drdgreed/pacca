<svg width="1000" height="606" viewBox="0 0 1000 606" xmlns="http://www.w3.org/2000/svg"><rect x="0" y="0" width="1000" height="606" rx="14" fill="#111318" stroke="#2c3444" stroke-width="1"/><text x="36" y="46" text-anchor="start" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#e8edf5">PACCA Escalation Tree</text><text x="37" y="70" text-anchor="start" font-family="Arial, sans-serif" font-size="12.5" font-weight="400" fill="#9aa6b8">Deterministic safety logic that overrides model confidence. 11 escalation reasons, each mapped to a branch.</text><rect x="40" y="104" width="920" height="150" rx="11" fill="#171b22" stroke="#2a3242" stroke-width="1"/><rect x="40" y="104" width="5" height="150" rx="2.5" fill="#2BC0C8"/><text x="60" y="126" text-anchor="start" font-family="'JetBrains Mono','SFMono-Regular',Menlo,monospace" font-size="11" font-weight="700" fill="#2BC0C8">A · PRE-FLIGHT  ·  ClinicalRiskDetector.evaluate()</text><text x="60" y="147" text-anchor="start" font-family="Arial, sans-serif" font-size="14.5" font-weight="700" fill="#e8edf5">7 deterministic gates — no LLM, runs before any agent is called</text><rect x="60" y="160" width="166.5" height="21" rx="10.5" fill="#143038" stroke="#1f5d63" stroke-width="1"/><path d="M71,170.5 l3,3 l6,-7" stroke="#67e8c3" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="85" y="174.0" text-anchor="start" font-family="'JetBrains Mono','SFMono-Regular',Menlo,monospace" font-size="9.5" font-weight="400" fill="#bfe9ec">experimental_treatment</text><rect x="236.5" y="160" width="120.5" height="21" rx="10.5" fill="#143038" stroke="#1f5d63" stroke-width="1"/><path d="M247.5,170.5 l3,3 l6,-7" stroke="#67e8c3" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="261.5" y="174.0" text-anchor="start" font-family="'JetBrains Mono','SFMono-Regular',Menlo,monospace" font-size="9.5" font-weight="400" fill="#bfe9ec">rare_condition</text><rect x="367.0" y="160" width="166.5" height="21" rx="10.5" fill="#143038" stroke="#1f5d63" stroke-width="1"/><path d="M378.0,170.5 l3,3 l6,-7" stroke="#67e8c3" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="392.0" y="174.0" text-anchor="start" font-family="'JetBrains Mono','SFMono-Regular',Menlo,monospace" font-size="9.5" font-weight="400" fill="#bfe9ec">conflicting_guidelines</text><rect x="543.5" y="160" width="183.8" height="21" rx="10.5" fill="#143038" stroke="#1f5d63" stroke-width="1"/><path d="M554.5,170.5 l3,3 l6,-7" stroke="#67e8c3" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="568.5" y="174.0" text-anchor="start" font-family="'JetBrains Mono','SFMono-Regular',Menlo,monospace" font-size="9.5" font-weight="400" fill="#bfe9ec">prior_denial_same_service</text><rect x="60" y="188" width="91.8" height="21" rx="10.5" fill="#143038" stroke="#1f5d63" stroke-width="1"/><path d="M71,198.5 l3,3 l6,-7" stroke="#67e8c3" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="85" y="202.0" text-anchor="start" font-family="'JetBrains Mono','SFMono-Regular',Menlo,monospace" font-size="9.5" font-weight="400" fill="#bfe9ec">high_cost</text><rect x="161.75" y="188" width="137.8" height="21" rx="10.5" fill="#143038" stroke="#1f5d63" stroke-width="1"/><path d="M172.75,198.5 l3,3 l6,-7" stroke="#67e8c3" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="186.75" y="202.0" text-anchor="start" font-family="'JetBrains Mono','SFMono-Regular',Menlo,monospace" font-size="9.5" font-weight="400" fill="#bfe9ec">pediatric_complex</text><rect x="309.5" y="188" width="114.8" height="21" rx="10.5" fill="#143038" stroke="#1f5d63" stroke-width="1"/><path d="M320.5,198.5 l3,3 l6,-7" stroke="#67e8c3" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="334.5" y="202.0" text-anchor="start" font-family="'JetBrains Mono','SFMono-Regular',Menlo,monospace" font-size="9.5" font-weight="400" fill="#bfe9ec">adult_complex</text><rect x="60" y="222" width="420" height="21" rx="10.5" fill="#1d1812" stroke="#5a4326" stroke-width="1" stroke-dasharray="3 3"/><text x="72" y="236.5" text-anchor="start" font-family="'JetBrains Mono','SFMono-Regular',Menlo,monospace" font-size="9.5" font-weight="400" fill="#caa978">✕ any gate hit → escalation_pre_flight_triggered → IN_REVIEW</text><line x1="500" y1="254" x2="500" y2="267" stroke="#9ca3af" stroke-width="2"/><path d="M495,266 L505,266 L500,274 Z" fill="#9ca3af"/><rect x="40" y="276" width="920" height="118" rx="11" fill="#171b22" stroke="#2a3242" stroke-width="1"/><rect x="40" y="276" width="5" height="118" rx="2.5" fill="#F97316"/><text x="60" y="298" text-anchor="start" font-family="'JetBrains Mono','SFMono-Regular',Menlo,monospace" font-size="11" font-weight="700" fill="#F97316">B · TIER-1 CONFIDENCE ROUTING  ·  3 branches</text><text x="60" y="319" text-anchor="start" font-family="Arial, sans-serif" font-size="14.5" font-weight="700" fill="#e8edf5">The model proposes a confidence; the tree decides what that buys</text><rect x="60" y="332" width="293.3333333333333" height="26" rx="4" fill="#5a2f2f"/><rect x="353.3333333333333" y="332" width="293.3333333333333" height="26" rx="0" fill="#6a5320"/><rect x="646.6666666666666" y="332" width="293.3333333333333" height="26" rx="4" fill="#27613f"/><text x="206.66666666666666" y="349" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#e8b9b9">&lt; 0.90   →  IN_REVIEW</text><text x="500.0" y="349" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#f3dca2">0.90–0.95   →  MEDICAL DIRECTOR</text><text x="793.3333333333333" y="349" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="600" fill="#a7e8c0">≥ 0.95   →  AUTO-APPROVE</text><text x="60" y="380" text-anchor="start" font-family="'JetBrains Mono','SFMono-Regular',Menlo,monospace" font-size="9.5" font-weight="400" fill="#6a7488">confidence_below_threshold  ·  medical_director_required</text><line x1="500" y1="394" x2="500" y2="407" stroke="#9ca3af" stroke-width="2"/><path d="M495,406 L505,406 L500,414 Z" fill="#9ca3af"/><rect x="40" y="416" width="920" height="118" rx="11" fill="#171b22" stroke="#2a3242" stroke-width="1"/><rect x="40" y="416" width="5" height="118" rx="2.5" fill="#a78bfa"/><text x="60" y="438" text-anchor="start" font-family="'JetBrains Mono','SFMono-Regular',Menlo,monospace" font-size="11" font-weight="700" fill="#a78bfa">C · RUNTIME SAFETY SHORT-CIRCUITS  ·  governance rollout P-4 / P-5</text><text x="60" y="459" text-anchor="start" font-family="Arial, sans-serif" font-size="14.5" font-weight="700" fill="#e8edf5">Added 2026 — these fire before confidence routing and cannot be outvoted by it</text><rect x="60" y="474" width="382.5" height="21" rx="10.5" fill="#2a1c10" stroke="#7a4a1a" stroke-width="1"/><text x="73" y="488.0" text-anchor="start" font-family="'JetBrains Mono','SFMono-Regular',Menlo,monospace" font-size="9.5" font-weight="400" fill="#f6c98a">scope_violation — touched something outside the declared scope</text><rect x="60" y="502" width="422.8" height="21" rx="10.5" fill="#1f1b33" stroke="#4c3f7a" stroke-width="1"/><text x="73" y="516.0" text-anchor="start" font-family="'JetBrains Mono','SFMono-Regular',Menlo,monospace" font-size="9.5" font-weight="400" fill="#cfc2f5">ungrounded_evidence — cited an evidence id absent from the submission</text><text x="36" y="580" text-anchor="start" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#6a7488">Source of truth: EscalationReason in src/pacca/models/enums.py (11 members) and the branch labels in agents/orchestrator.py.</text></svg>
