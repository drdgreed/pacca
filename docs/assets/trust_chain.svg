<svg width="1000" height="664" viewBox="0 0 1000 664" xmlns="http://www.w3.org/2000/svg"><rect x="0" y="0" width="1000" height="664" rx="14" fill="#111318" stroke="#2c3444" stroke-width="1"/><text x="36" y="46" text-anchor="start" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#e8edf5">PACCA Trust Chain</text><text x="37" y="70" text-anchor="start" font-family="Arial, sans-serif" font-size="12.5" font-weight="400" fill="#9aa6b8">Three gates stand between the model's output and an automated decision. Any gate trips → a human decides.</text><line x1="684" y1="104" x2="684" y2="606" stroke="#222937" stroke-width="1"/><text x="700" y="122" text-anchor="start" font-family="'JetBrains Mono','SFMono-Regular',Menlo,monospace" font-size="11" font-weight="700" fill="#fbbf24">HUMAN REVIEW</text><rect x="40" y="116" width="616" height="118" rx="11" fill="#171b22" stroke="#2a3242" stroke-width="1"/><rect x="40" y="116" width="5" height="118" rx="2.5" fill="#2BC0C8"/><text x="60" y="138" text-anchor="start" font-family="'JetBrains Mono','SFMono-Regular',Menlo,monospace" font-size="11" font-weight="700" fill="#2BC0C8">1 · DECLARE  ·  P-3 · IntentRecord</text><text x="60" y="160" text-anchor="start" font-family="Arial, sans-serif" font-size="14.5" font-weight="700" fill="#e8edf5">What is this run allowed to touch?</text><text x="60" y="179" text-anchor="start" font-family="Arial, sans-serif" font-size="10.5" font-weight="400" fill="#9aa6b8">Every run opens by declaring its own scope — allowed collections,</text><text x="60" y="194" text-anchor="start" font-family="Arial, sans-serif" font-size="10.5" font-weight="400" fill="#9aa6b8">allowed actions, an opaque subject reference, expected effects.</text><rect x="60" y="204" width="112.2" height="21" rx="10.5" fill="#1b2030" stroke="#46506a" stroke-width="1"/><text x="73" y="218.0" text-anchor="start" font-family="'JetBrains Mono','SFMono-Regular',Menlo,monospace" font-size="9.5" font-weight="400" fill="#aeb9cd">intent.declared</text><text x="184.25" y="219" text-anchor="start" font-family="Arial, sans-serif" font-size="9.5" font-weight="400" fill="#6a7488" font-style="italic">emitted as the FIRST audit event</text><text x="704" y="179.0" text-anchor="start" font-family="Arial, sans-serif" font-size="9.5" font-weight="400" fill="#6a7488" font-style="italic">(record-only — no denial)</text><line x1="348" y1="234" x2="348" y2="245" stroke="#9ca3af" stroke-width="2"/><path d="M343,244 L353,244 L348,252 Z" fill="#9ca3af"/><rect x="40" y="254" width="616" height="118" rx="11" fill="#171b22" stroke="#2a3242" stroke-width="1"/><rect x="40" y="254" width="5" height="118" rx="2.5" fill="#F97316"/><text x="60" y="276" text-anchor="start" font-family="'JetBrains Mono','SFMono-Regular',Menlo,monospace" font-size="11" font-weight="700" fill="#F97316">2 · CONFINE  ·  P-4 · Minimum-necessary scope guard</text><text x="60" y="298" text-anchor="start" font-family="Arial, sans-serif" font-size="14.5" font-weight="700" fill="#e8edf5">Did it stay inside what it declared?</text><text x="60" y="317" text-anchor="start" font-family="Arial, sans-serif" font-size="10.5" font-weight="400" fill="#9aa6b8">enforce_scope() wraps every DB write and RAG query. An unknown action,</text><text x="60" y="332" text-anchor="start" font-family="Arial, sans-serif" font-size="10.5" font-weight="400" fill="#9aa6b8">a cross-case identifier, or a non-allowed collection is denied.</text><rect x="60" y="342" width="210.0" height="21" rx="10.5" fill="#1b2030" stroke="#46506a" stroke-width="1"/><text x="73" y="356.0" text-anchor="start" font-family="'JetBrains Mono','SFMono-Regular',Menlo,monospace" font-size="9.5" font-weight="400" fill="#aeb9cd">EscalationReason.SCOPE_VIOLATION</text><text x="282.0" y="357" text-anchor="start" font-family="Arial, sans-serif" font-size="9.5" font-weight="400" fill="#6a7488" font-style="italic">HIPAA minimum-necessary, expressed in code</text><line x1="658" y1="313.0" x2="693" y2="313.0" stroke="#7a4a1a" stroke-width="2" stroke-dasharray="4 3"/><path d="M692,308.0 L692,318.0 L700,313.0 Z" fill="#7a4a1a"/><rect x="704" y="303.0" width="112.2" height="21" rx="10.5" fill="#2a1c10" stroke="#7a4a1a" stroke-width="1"/><text x="717" y="317.0" text-anchor="start" font-family="'JetBrains Mono','SFMono-Regular',Menlo,monospace" font-size="9.5" font-weight="400" fill="#f6c98a">scope_violation</text><line x1="348" y1="372" x2="348" y2="383" stroke="#9ca3af" stroke-width="2"/><path d="M343,382 L353,382 L348,390 Z" fill="#9ca3af"/><rect x="40" y="392" width="616" height="118" rx="11" fill="#171b22" stroke="#2a3242" stroke-width="1"/><rect x="40" y="392" width="5" height="118" rx="2.5" fill="#a78bfa"/><text x="60" y="414" text-anchor="start" font-family="'JetBrains Mono','SFMono-Regular',Menlo,monospace" font-size="11" font-weight="700" fill="#a78bfa">3 · VERIFY  ·  P-5 · Evidence-grounding detector</text><text x="60" y="436" text-anchor="start" font-family="Arial, sans-serif" font-size="14.5" font-weight="700" fill="#e8edf5">Did it cite evidence that doesn't exist?</text><text x="60" y="455" text-anchor="start" font-family="Arial, sans-serif" font-size="10.5" font-weight="400" fill="#9aa6b8">The decision must name the evidence ids it relied on. Any id absent</text><text x="60" y="470" text-anchor="start" font-family="Arial, sans-serif" font-size="10.5" font-weight="400" fill="#9aa6b8">from the submission is caught deterministically — no second LLM.</text><rect x="60" y="480" width="233.0" height="21" rx="10.5" fill="#1b2030" stroke="#46506a" stroke-width="1"/><text x="73" y="494.0" text-anchor="start" font-family="'JetBrains Mono','SFMono-Regular',Menlo,monospace" font-size="9.5" font-weight="400" fill="#aeb9cd">EscalationReason.UNGROUNDED_EVIDENCE</text><text x="305.0" y="495" text-anchor="start" font-family="Arial, sans-serif" font-size="9.5" font-weight="400" fill="#6a7488" font-style="italic">the anti-hallucination gate, at runtime</text><line x1="658" y1="451.0" x2="693" y2="451.0" stroke="#7a4a1a" stroke-width="2" stroke-dasharray="4 3"/><path d="M692,446.0 L692,456.0 L700,451.0 Z" fill="#7a4a1a"/><rect x="704" y="441.0" width="135.2" height="21" rx="10.5" fill="#2a1c10" stroke="#7a4a1a" stroke-width="1"/><text x="717" y="455.0" text-anchor="start" font-family="'JetBrains Mono','SFMono-Regular',Menlo,monospace" font-size="9.5" font-weight="400" fill="#f6c98a">ungrounded_evidence</text><text x="700" y="560" text-anchor="start" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#6a7488">every off-ramp lands here —</text><text x="700" y="575" text-anchor="start" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#6a7488">fail-closed, never fail-open.</text><text x="700" y="597" text-anchor="start" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#6a7488" font-style="italic">A human deciding is the</text><text x="700" y="611" text-anchor="start" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#6a7488" font-style="italic">designed outcome, not the</text><text x="700" y="625" text-anchor="start" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#6a7488" font-style="italic">failure mode.</text><line x1="348" y1="528" x2="348" y2="539" stroke="#9ca3af" stroke-width="2"/><path d="M343,538 L353,538 L348,546 Z" fill="#9ca3af"/><rect x="40" y="548" width="616" height="62" rx="11" fill="#171b22" stroke="#2a3242" stroke-width="1"/><rect x="40" y="548" width="5" height="62" rx="2.5" fill="#4ade80"/><text x="60" y="572" text-anchor="start" font-family="'JetBrains Mono','SFMono-Regular',Menlo,monospace" font-size="11" font-weight="700" fill="#4ade80">4 · DECIDE</text><text x="60" y="593" text-anchor="start" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#e8edf5">All three gates clear — confidence routing decides the outcome</text><text x="36" y="638" text-anchor="start" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#6a7488">Gates 2 and 3 are deterministic — no model judges the model. In correct operation none of them fire; their value is what happens when something goes wrong.</text></svg>
